services:
  backend:
    build: . 
    container_name: backend-php 
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html 
  
  db: 
    image: mysql:9.4.0 
    environment:       
      MYSQL_DATABASE: mvc
      MYSQL_ROOT_PASSWORD: root
    volumes: 
      - ./storage/dbdata:/var/lib/mysql
    ports: 
      - 3360:3306