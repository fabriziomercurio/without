services:
  backend:
    build: .
    container_name: backend-php
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./uploads:/var/www/html/uploads
      - /var/www/html/vendor
    command: > 
     sh -c "chmod -R 777 /var/www/html/uploads && 
            exec apache2-foreground" 

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.2.3
    restart: always
    depends_on:
      - db
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root 
    ports:
      - "8081:80"

  db: 
    image: mysql:9.4.0 
    environment:       
      MYSQL_DATABASE: mvc
      MYSQL_ROOT_PASSWORD: root
    volumes: 
      - ./storage/dbdata:/var/lib/mysql
    ports: 
      - 3360:3306